<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
</head>
<body>
    Watching geolocation!
    <script>
        const watcher = navigator.geolocation.watchPosition((position) => {
            alert(`Lat: ${position.coords.latitude} | Lng: ${position.coords.longitude} | Speed: ${position.coords.speed} m/s = ${position.coords.speed * 2.23694} mph`);
        });
    </script>
</body>
</html>
